name: dispatch-stock-automation

on:
  workflow_dispatch:
  schedule:
  - cron: "0 * * * *"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger private repo workflow
        env:
          GH_PAT: ${{ secrets.PRIVATE_REPO_DISPATCH_TOKEN }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            https://api.github.com/repos/keybod18-sudo/stock-automation/actions/workflows/stock_automation_workflow.yml/dispatches \
            -d '{"ref":"main"}'
